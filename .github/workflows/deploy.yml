# ─────────────────────────────────────────────────────────────────────────────
# Bridgepoint Business Collective — GitHub Actions Deployment Workflow
#
# What this does:
#   Every time you push changes to the "main" branch, GitHub automatically:
#   1. Installs the project dependencies
#   2. Builds the React site into deployable files (the "dist" folder)
#   3. Publishes those files to GitHub Pages
#
# You never need to run a build command on your own computer.
# Just push your code and the site updates automatically within ~2 minutes.
# ─────────────────────────────────────────────────────────────────────────────

name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build React Site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
        working-directory: .

      - name: Build the site
        run: pnpm run build
        working-directory: .

      - name: Upload build output
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist/public

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
